spring:
  application:
    name: celucheck
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/celucheck?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration-mysql,classpath:db/migration
  thymeleaf:
    cache: false
server:
  port: ${PORT:8080}
  error:
    include-message: always
  servlet:
    session:
      cookie:
        same-site: lax
app:
  name: CeluCheck

---
spring:
  config:
    activate:
      on-profile: demo
  datasource:
    url: jdbc:h2:file:./data/celucheck-demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

---
spring:
  config:
    activate:
      on-profile: render
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration-postgres,classpath:db/migration
