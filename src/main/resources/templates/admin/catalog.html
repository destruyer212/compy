<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/layout :: head('Catálogo admin')}"></head><body class="bg-cloud font-sans text-ink"><div class="admin-shell"><aside th:replace="~{admin/fragments :: sidebar('catalog')}"></aside><main class="p-6 lg:p-10"><div class="flex flex-wrap items-end justify-between gap-4"><div><p class="text-sm font-bold uppercase tracking-widest text-brand">Inventario</p><h1 class="mt-2 text-3xl font-extrabold">Catálogo de celulares</h1></div><button onclick="document.querySelector('#phone-form').classList.toggle('hidden')" class="rounded-xl bg-brand px-5 py-3 font-extrabold text-white">Añadir equipo +</button></div><div th:if="${success}" class="mt-5 rounded-xl bg-emerald-50 p-3 text-emerald-700" th:text="${success}"></div>
<section id="phone-form" class="mt-7 hidden rounded-3xl bg-white p-7 shadow-sm"><div class="flex justify-between"><h2 class="text-xl font-extrabold">Datos del equipo</h2><button type="button" onclick="document.querySelector('#phone-form').classList.add('hidden')">×</button></div><form th:action="@{/admin/catalogo}" th:object="${phoneForm}" method="post" class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4"><input type="hidden" th:field="*{id}" id="form-id"><label><span class="mb-2 block text-xs font-bold">Marca</span><select class="field" th:field="*{brandId}" id="form-brand" required><option value="">Seleccionar</option><option th:each="b:${brands}" th:value="${b.id}" th:text="${b.name}"></option></select></label><label class="md:col-span-2"><span class="mb-2 block text-xs font-bold">Nombre comercial</span><input class="field" th:field="*{name}" id="form-name" required></label><label><span class="mb-2 block text-xs font-bold">Modelo</span><input class="field" th:field="*{model}" id="form-model" required></label><label><span class="mb-2 block text-xs font-bold">Almacenamiento GB</span><input class="field" type="number" th:field="*{storageGb}" id="form-storage" required></label><label><span class="mb-2 block text-xs font-bold">RAM GB</span><input class="field" type="number" th:field="*{ramGb}" id="form-ram" required></label><label><span class="mb-2 block text-xs font-bold">Pantalla pulgadas</span><input class="field" type="number" step=".1" th:field="*{screenInches}" id="form-screen" required></label><label><span class="mb-2 block text-xs font-bold">Cámara MP</span><input class="field" type="number" th:field="*{cameraMp}" id="form-camera" required></label><label><span class="mb-2 block text-xs font-bold">Batería mAh</span><input class="field" type="number" th:field="*{batteryMah}" id="form-battery" required></label><label class="md:col-span-2"><span class="mb-2 block text-xs font-bold">Procesador</span><input class="field" th:field="*{processor}" id="form-processor" required></label><label class="md:col-span-2"><span class="mb-2 block text-xs font-bold">Ruta de imagen</span><input class="field" th:field="*{imageUrl}" id="form-image" required placeholder="/images/phone-blue.svg"></label><label><span class="mb-2 block text-xs font-bold">Precio Falabella</span><input class="field" type="number" step=".01" th:field="*{falabellaPrice}"></label><label><span class="mb-2 block text-xs font-bold">Precio Ripley</span><input class="field" type="number" step=".01" th:field="*{ripleyPrice}"></label><label><span class="mb-2 block text-xs font-bold">Precio Oechsle</span><input class="field" type="number" step=".01" th:field="*{oechslePrice}"></label><label class="flex items-center gap-2 pt-7"><input type="checkbox" th:field="*{featured}" id="form-featured"> <span class="text-sm font-bold">Destacado</span></label><label class="md:col-span-2 xl:col-span-4"><span class="mb-2 block text-xs font-bold">Descripción</span><textarea class="field" rows="3" th:field="*{description}" id="form-description" required></textarea></label><div class="md:col-span-2 xl:col-span-4"><button class="rounded-xl bg-ink px-6 py-3 font-bold text-white">Guardar equipo</button></div></form></section>
<section class="mt-7 rounded-3xl bg-white p-5 shadow-sm"><div class="data-wrap"><table class="data-table"><thead><tr><th>Equipo</th><th>Specs</th><th>Falabella</th><th>Ripley</th><th>Oechsle</th><th>Estado</th><th></th></tr></thead><tbody><tr th:each="p:${phones}"><td><div class="flex min-w-60 items-center gap-3"><img th:src="${p.imageUrl}" class="h-16 w-12 object-contain" alt=""><div><strong class="block" th:text="${p.name}"></strong><span class="text-xs text-slate-400" th:text="${p.brand.name}"></span></div></div></td><td class="whitespace-nowrap text-sm" th:text="${p.ramGb+' GB · '+p.storageGb+' GB'}"></td><td><span th:each="o:${p.offers}" th:if="${o.store.slug=='falabella'}" th:text="${'S/ '+#numbers.formatDecimal(o.price,1,0)}"></span></td><td><span th:each="o:${p.offers}" th:if="${o.store.slug=='ripley'}" th:text="${'S/ '+#numbers.formatDecimal(o.price,1,0)}"></span></td><td><span th:each="o:${p.offers}" th:if="${o.store.slug=='oechsle'}" th:text="${'S/ '+#numbers.formatDecimal(o.price,1,0)}"></span></td><td><span class="rounded-full px-3 py-1 text-xs font-bold" th:classappend="${p.active?' bg-emerald-50 text-emerald-700':' bg-slate-100 text-slate-500'}" th:text="${p.active?'ACTIVO':'INACTIVO'}"></span></td><td><div class="flex gap-2"><button type="button" class="edit-phone rounded-lg border px-3 py-2 text-sm font-bold" th:data-id="${p.id}" th:data-brand="${p.brand.id}" th:data-name="${p.name}" th:data-model="${p.model}" th:data-storage="${p.storageGb}" th:data-ram="${p.ramGb}" th:data-screen="${p.screenInches}" th:data-camera="${p.cameraMp}" th:data-battery="${p.batteryMah}" th:data-processor="${p.processor}" th:data-image="${p.imageUrl}" th:data-description="${p.description}" th:data-featured="${p.featured}">Editar</button><form th:action="@{'/admin/catalogo/'+${p.id}+'/eliminar'}" method="post" onsubmit="return confirm('¿Desactivar este equipo?')"><button class="rounded-lg border border-red-200 px-3 py-2 text-sm font-bold text-red-600">Desactivar</button></form></div></td></tr></tbody></table></div></section>
</main></div><script>document.querySelectorAll('.edit-phone').forEach(b=>b.addEventListener('click',()=>{const d=b.dataset;document.querySelector('#phone-form').classList.remove('hidden');['id','brand','name','model','storage','ram','screen','camera','battery','processor','image','description'].forEach(k=>{const e=document.querySelector('#form-'+k);if(e)e.value=d[k]||''});document.querySelector('#form-featured').checked=d.featured==='true';document.querySelector('#phone-form').scrollIntoView({behavior:'smooth'})}))</script></body></html>
