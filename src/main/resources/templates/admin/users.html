<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/layout :: head('Usuarios admin')}"></head><body class="bg-cloud font-sans text-ink"><div class="admin-shell"><aside th:replace="~{admin/fragments :: sidebar('users')}"></aside><main class="p-6 lg:p-10"><p class="text-sm font-bold uppercase tracking-widest text-brand">Administración</p><h1 class="mt-2 text-3xl font-extrabold">Listado de usuarios</h1><section class="mt-8 rounded-3xl bg-white p-5 shadow-sm"><div class="data-wrap"><table class="data-table"><thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Registro</th><th></th></tr></thead><tbody><tr th:each="u:${users}"><td th:text="${#numbers.formatInteger(u.id,2)}"></td><td class="font-bold" th:text="${u.fullName}"></td><td th:text="${u.email}"></td><td><span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-brand" th:text="${u.role}"></span></td><td><span class="rounded-full px-3 py-1 text-xs font-bold" th:classappend="${u.enabled?' bg-emerald-50 text-emerald-700':' bg-red-50 text-red-600'}" th:text="${u.enabled?'ACTIVO':'INACTIVO'}"></span></td><td class="whitespace-nowrap text-sm text-slate-500" th:text="${#temporals.format(u.createdAt,'dd/MM/yyyy')}"></td><td><div th:if="${u.role.name()!='ADMIN'}" class="flex gap-2"><form th:action="@{'/admin/usuarios/'+${u.id}+'/estado'}" method="post"><button class="rounded-lg border px-3 py-2 text-xs font-bold" th:text="${u.enabled?'Desactivar':'Activar'}"></button></form><form th:action="@{'/admin/usuarios/'+${u.id}+'/eliminar'}" method="post" onsubmit="return confirm('¿Eliminar este usuario?')"><button class="rounded-lg border border-red-200 px-3 py-2 text-xs font-bold text-red-600">Eliminar</button></form></div></td></tr></tbody></table></div></section></main></div></body></html>
