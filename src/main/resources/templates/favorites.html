<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/layout :: head('Mis favoritos')}"></head><body class="bg-cloud font-sans text-ink"><header th:replace="~{fragments/layout :: header}"></header><main class="mx-auto min-h-[65vh] max-w-7xl px-6 py-12"><p class="text-sm font-bold uppercase tracking-widest text-brand">Tu lista personal</p><h1 class="mt-2 text-4xl font-extrabold">Mis celulares favoritos</h1><p class="mt-3 text-slate-500">Vuelve a comparar sus precios cuando quieras.</p><div th:if="${favorites.empty}" class="mt-10 rounded-3xl bg-white p-16 text-center shadow-sm"><div class="text-5xl">♡</div><h2 class="mt-4 text-xl font-bold">Aún no guardaste celulares</h2><a href="/" class="mt-6 inline-block rounded-xl bg-brand px-5 py-3 font-bold text-white">Explorar catálogo</a></div><div class="mt-8 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"><article th:each="f:${favorites}" class="rounded-3xl border bg-white p-5"><div class="grid h-52 place-items-center rounded-2xl bg-slate-50"><img th:src="${f.phone.imageUrl}" class="h-44" alt=""></div><p class="mt-5 text-xs font-bold uppercase tracking-widest text-brand" th:text="${f.phone.brand.name}"></p><h2 class="mt-2 text-lg font-extrabold" th:text="${f.phone.name}"></h2><div class="mt-4 flex gap-2"><a th:href="@{'/productos/'+${f.phone.slug}}" class="flex-1 rounded-xl bg-ink p-3 text-center text-sm font-bold text-white">Ver precios</a><button class="favorite-btn rounded-xl border px-4 text-xl text-red-500" th:data-id="${f.phone.id}">♥</button></div></article></div></main><footer th:replace="~{fragments/layout :: footer}"></footer><div th:replace="~{fragments/layout :: chat}"></div></body></html>
