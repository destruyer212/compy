<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/layout :: head('Iniciar sesión')}"></head><body class="min-h-screen bg-cloud font-sans text-ink"><header th:replace="~{fragments/layout :: header}"></header><main class="grid min-h-[calc(100vh-80px)] place-items-center px-5 py-12"><div class="w-full max-w-md rounded-[2rem] border border-slate-200 bg-white p-8 shadow-soft sm:p-10"><div class="text-center"><img src="/images/logo.svg" class="mx-auto h-14 w-14" alt=""><h1 class="mt-5 text-3xl font-extrabold">Bienvenido de vuelta</h1><p class="mt-2 text-sm text-slate-500">Ingresa para guardar favoritos y administrar tu cuenta.</p></div><div th:if="${param.error}" class="mt-6 rounded-xl bg-red-50 p-3 text-sm text-red-700">Correo o contraseña incorrectos, o la cuenta está inactiva.</div><div th:if="${param.logout}" class="mt-6 rounded-xl bg-emerald-50 p-3 text-sm text-emerald-700">Sesión cerrada correctamente.</div><div th:if="${success}" class="mt-6 rounded-xl bg-emerald-50 p-3 text-sm text-emerald-700" th:text="${success}"></div><form th:action="@{/login}" method="post" class="mt-7 space-y-5"><label class="block"><span class="mb-2 block text-sm font-bold">Correo electrónico</span><input class="field" type="email" name="email" autocomplete="email" required placeholder="tu@correo.com"></label><label class="block"><span class="mb-2 block text-sm font-bold">Contraseña</span><input class="field" type="password" name="password" autocomplete="current-password" required placeholder="••••••••"></label><button class="w-full rounded-xl bg-brand py-3.5 font-extrabold text-white hover:bg-blue-700">Iniciar sesión</button></form><p class="mt-6 text-center text-sm text-slate-500">¿No tienes cuenta? <a href="/registro" class="font-bold text-brand">Crear cuenta</a></p><div class="mt-6 rounded-xl bg-slate-50 p-3 text-xs leading-5 text-slate-500"><strong>Demo admin:</strong> admin@celucheck.pe / Admin123!</div></div></main></body></html>
